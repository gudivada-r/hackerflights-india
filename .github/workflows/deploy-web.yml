name: 🌐 Web → Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  deploy-web:
    name: Build Web + Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Export Expo web build
        working-directory: mobile
        run: npx expo export --platform web

      - name: Write web server wrapper
        working-directory: mobile
        run: |
          cat > server.js << 'EOF'
          const express = require('express');
          const path = require('path');
          const app = express();
          const PORT = process.env.PORT || 8080;
          app.use(express.static(path.join(__dirname, 'dist')));
          app.get('*', (req, res) => res.sendFile(path.join(__dirname, 'dist', 'index.html')));
          app.listen(PORT, () => console.log(`HackerFlights web running on port ${PORT}`));
          EOF
          npm install express --save-prod

      - name: Write web Dockerfile
        working-directory: mobile
        run: |
          cat > Dockerfile.web << 'EOF'
          FROM node:20-slim
          WORKDIR /app
          COPY package*.json ./
          RUN npm install --production
          COPY dist ./dist
          COPY server.js ./
          ENV PORT=8080
          EXPOSE 8080
          CMD ["node", "server.js"]
          EOF

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & Push web Docker image
        working-directory: mobile
        run: |
          IMAGE=us-central1-docker.pkg.dev/gen-lang-client-0147006467/cloud-run-source-deploy/hackerflights-web:${{ github.sha }}
          docker build -f Dockerfile.web -t $IMAGE .
          docker push $IMAGE

      - name: Deploy web to Cloud Run
        run: |
          gcloud run deploy hackerflights-web \
            --image us-central1-docker.pkg.dev/gen-lang-client-0147006467/cloud-run-source-deploy/hackerflights-web:${{ github.sha }} \
            --region us-central1 \
            --project gen-lang-client-0147006467 \
            --allow-unauthenticated \
            --quiet

      - name: Print web URL
        run: echo "🌐 Web app live — check Cloud Run console for URL"
